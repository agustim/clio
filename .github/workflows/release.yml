name: release

# Es dispara amb els tags v* que crea scripts/release.sh.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # crear releases
  packages: write   # pujar a ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/agustim/clio

jobs:
  # 1) Executable + GitHub Release
  binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build release
        run: cargo build --release --locked --bin linkanalyzer

      - name: Empaqueta binari
        run: |
          BIN="linkanalyzer-${GITHUB_REF_NAME}-linux-x86_64"
          install -m755 target/release/linkanalyzer "$BIN"
          sha256sum "$BIN" > "$BIN.sha256"

      - name: Crea release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true   # aquesta versió passa a ser "latest"
          files: |
            linkanalyzer-${{ github.ref_name }}-linux-x86_64
            linkanalyzer-${{ github.ref_name }}-linux-x86_64.sha256

  # 2) Container -> GitHub Packages (ghcr.io)
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build i push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) Neteja: manté com a màxim les últimes 5 de cada
  cleanup:
    needs: [binary, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Esborra releases velles (manté 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --json tagName,createdAt -L 100 \
            | jq -r 'sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
            | while read -r tag; do
                [ -z "$tag" ] && continue
                echo "esborrant release+tag $tag"
                gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
              done

      - name: Esborra packages vells (manté 5, protegeix latest)
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: '^latest$'
